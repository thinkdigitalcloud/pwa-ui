name: Publish package
# Publishes @thinkdigitalcloud/pwa-ui to GitHub Packages.

# Publishes @thinkdigitalcloud/pwa-ui to GitHub Packages when a GitHub Release
# is published. The built-in GITHUB_TOKEN has packages:write for this repo, so
# no personal access token needs to be stored.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@thinkdigitalcloud'
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
